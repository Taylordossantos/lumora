<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumora | Plataforma de Streaming</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                orange: "#ff8c00",
                red: "#ff4b2b",
              },
            },
            fontFamily: {
              display: ["Outfit", "sans-serif"],
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Swiper.js -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Toastify -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Animate.css -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <!-- ========================================== -->
    <!-- VIEW: HOME -->
    <!-- ========================================== -->
    <div id="view-home" class="page-content active">
      <!-- Header -->
      <header
        id="home-header"
        class="fixed w-full z-50 flex justify-between items-center px-6 md:px-12 py-4 transition-all duration-500"
      >
        <div class="flex items-center gap-8">
          <span
            onclick="navigateTo('home')"
            class="text-3xl font-black tracking-tighter lumora-text-gradient cursor-pointer font-display"
            >LUMORA</span
          >
          <nav class="hidden lg:flex gap-6 text-sm font-medium text-gray-300">
            <a href="#" class="text-white">Início</a>
            <a href="#" class="hover:text-brand-orange transition-colors"
              >Séries</a
            >
            <a href="#" class="hover:text-brand-orange transition-colors"
              >Filmes</a
            >
            <a href="#" class="hover:text-brand-orange transition-colors"
              >Minha Lista</a
            >
          </nav>
        </div>
        <div class="flex items-center gap-6">
          <i
            data-lucide="search"
            class="w-5 h-5 text-gray-400 cursor-pointer hover:text-brand-orange transition-colors"
            onclick="
              navigateTo('search');
              setTimeout(
                () => document.getElementById('search-input').focus(),
                100,
              );
            "
          ></i>
          <i
            data-lucide="bell"
            class="w-5 h-5 text-gray-400 cursor-pointer hover:text-white transition-colors hover:scale-110"
          ></i>
          <div
            class="w-10 h-10 rounded-lg overflow-hidden border-2 border-transparent hover:border-brand-orange transition-all cursor-pointer shadow-lg"
            title="Perfil"
          >
            <img
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"
              alt="User"
            />
          </div>
        </div>
      </header>

      <!-- Hero -->
      <section class="relative h-[85vh] flex items-center px-6 md:px-12">
        <div class="absolute inset-0 z-0">
          <img
            src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80"
            class="w-full h-full object-cover"
            alt="Hero"
          />
          <div
            class="absolute inset-0 hero-vignette bg-gradient-to-t from-[#050505] via-[#050505]/40"
          ></div>
        </div>
        <div
          class="relative z-10 max-w-2xl animate__animated animate__fadeInUp"
        >
          <span
            class="bg-orange-600 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest mb-4 inline-block"
            >Destaque da Semana</span
          >
          <h1 class="text-4xl md:text-7xl font-black mb-4">Carregando...</h1>
          <p class="text-gray-300 text-lg mb-8 line-clamp-3"></p>
          <div class="flex gap-4">
            <button
              onclick="loadDetails(1)"
              class="flex items-center gap-2 bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-gray-200 transition-all"
            >
              <i data-lucide="play" class="fill-current w-5 h-5"></i> Assistir
            </button>
            <button
              class="flex items-center gap-2 bg-white/10 backdrop-blur-md px-8 py-3 rounded-xl font-bold hover:bg-white/20 transition-all"
            >
              <i data-lucide="info" class="w-5 h-5"></i> Saiba Mais
            </button>
          </div>
        </div>
      </section>

      <!-- Rows com Swiper -->
      <main class="relative z-20 -mt-20 pb-20 space-y-12">
        <section class="pl-6 md:pl-12">
          <h2 class="text-xl font-bold mb-4">Populares na Lumora</h2>
          <div class="swiper swiper-popular">
            <div class="swiper-wrapper" id="row-popular"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
          </div>
        </section>

        <section class="pl-6 md:pl-12">
          <h2 class="text-xl font-bold mb-4">Pura Adrenalina</h2>
          <div class="swiper swiper-action">
            <div class="swiper-wrapper" id="row-action"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
          </div>
        </section>
      </main>
    </div>

    <!-- ========================================== -->
    <!-- VIEW: DETAILS -->
    <!-- ========================================== -->
    <div id="view-details" class="page-content">
      <div
        id="details-backdrop"
        class="fixed inset-0 h-[70vh] z-0 bg-cover bg-center"
      >
        <div
          class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/70 to-[#050505]/90"
        ></div>
      </div>

      <header class="fixed w-full z-50 px-6 py-6 flex items-center gap-4">
        <button
          onclick="navigateTo('home')"
          class="bg-black/50 p-2 rounded-full backdrop-blur-md hover:bg-orange-500 transition-colors"
        >
          <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </button>
      </header>

      <main class="relative z-10 pt-32 px-6 md:px-12 max-w-7xl mx-auto pb-20">
        <div
          class="flex flex-col md:flex-row gap-10 items-start md:items-end mb-20"
        >
          <img
            id="details-poster"
            src=""
            class="w-64 md:w-80 rounded-2xl shadow-2xl border border-white/10"
          />
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-4 text-sm text-gray-400">
              <span id="details-year"></span> •
              <span id="details-duration">2h 15min</span> •
              <span class="border px-1 rounded">16+</span>
              <div class="flex items-center gap-1 text-orange-500">
                <i data-lucide="star" class="w-4 h-4 fill-current"></i>
                <span id="details-rating"></span>
              </div>
            </div>
            <h1
              id="details-title"
              class="text-4xl md:text-6xl font-black mb-4"
            ></h1>
            <p id="details-genre" class="text-orange-500 font-bold mb-6"></p>
            <p
              id="details-synopsis"
              class="text-gray-300 text-lg mb-8 max-w-3xl leading-relaxed"
            ></p>
            <div class="flex flex-wrap gap-4">
              <button
                onclick="openPlayer(currentMovieId)"
                class="lumora-gradient px-8 py-4 rounded-xl font-bold text-lg flex items-center gap-2 hover:scale-105 transition-all"
              >
                <i data-lucide="play" class="fill-current"></i> Assistir Agora
              </button>
              <button
                onclick="addToList()"
                class="bg-white/10 px-6 py-4 rounded-xl font-bold flex items-center gap-2 hover:bg-white/20 transition-all"
              >
                <i data-lucide="plus"></i> Minha Lista
              </button>
            </div>
          </div>
        </div>

        <!-- Cast -->
        <section class="mb-16">
          <h3 class="text-2xl font-bold mb-6 font-display">Elenco Principal</h3>
          <div
            id="details-cast"
            class="flex gap-8 overflow-x-auto no-scrollbar"
          ></div>
        </section>
      </main>
    </div>

    <!-- ========================================== -->
    <!-- VIEW: SEARCH -->
    <!-- ========================================== -->
    <div id="view-search" class="page-content">
      <header
        class="fixed w-full z-50 bg-black/90 backdrop-blur-md px-6 py-4 flex items-center gap-4 border-b border-white/10"
      >
        <button
          onclick="navigateTo('home')"
          class="hover:text-orange-500 transition-colors"
        >
          <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </button>
        <div class="relative flex-1 max-w-4xl mx-auto">
          <i
            data-lucide="search"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"
          ></i>
          <input
            type="text"
            id="search-input"
            onkeyup="handleSearch()"
            placeholder="Buscar títulos, sinopses ou gêneros..."
            class="w-full bg-white/10 border border-white/20 rounded-full py-3 pl-12 pr-4 focus:outline-none focus:border-orange-500 focus:bg-white/15 transition-all text-white placeholder-gray-400"
          />
        </div>
      </header>

      <main class="relative z-10 pt-32 px-6 md:px-12 max-w-7xl mx-auto pb-20">
        <!-- Filtros -->
        <div class="flex flex-wrap gap-4 mb-10">
          <select
            id="filter-genre"
            onchange="handleSearch()"
            class="bg-black border border-white/20 text-sm rounded-full px-5 py-2.5 focus:outline-none focus:border-orange-500 appearance-none cursor-pointer hover:bg-white/5 transition-colors"
          >
            <option value="all">Todos os Gêneros</option>
            <option value="Ação">Ação</option>
            <option value="Aventura">Aventura</option>
            <option value="Comédia">Comédia</option>
            <option value="Crime">Crime</option>
            <option value="Drama">Drama</option>
            <option value="Ficção Científica">Ficção Científica</option>
            <option value="Terror">Terror</option>
          </select>
          <select
            id="filter-year"
            onchange="handleSearch()"
            class="bg-black border border-white/20 text-sm rounded-full px-5 py-2.5 focus:outline-none focus:border-orange-500 appearance-none cursor-pointer hover:bg-white/5 transition-colors"
          >
            <option value="all">Qualquer Ano</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021 ou antes</option>
          </select>
          <select
            id="filter-rating"
            onchange="handleSearch()"
            class="bg-black border border-white/20 text-sm rounded-full px-5 py-2.5 focus:outline-none focus:border-orange-500 appearance-none cursor-pointer hover:bg-white/5 transition-colors"
          >
            <option value="0">Qualquer Avaliação</option>
            <option value="4.5">4.5+ Estrelas</option>
            <option value="4.0">4.0+ Estrelas</option>
            <option value="3.5">3.5+ Estrelas</option>
          </select>
        </div>

        <!-- Resultados -->
        <div
          id="search-results"
          class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"
        ></div>

        <!-- Empty State -->
        <div
          id="search-empty"
          class="hidden flex-col items-center justify-center py-20 text-center"
        >
          <i data-lucide="search-x" class="w-20 h-20 text-gray-600 mb-6"></i>
          <h3 class="text-2xl font-bold mb-2 font-display">
            Nenhum título encontrado
          </h3>
          <p class="text-gray-400 max-w-md">
            Não encontramos nada correspondente à sua busca. Que tal tentar
            outros termos?
          </p>
        </div>
      </main>
    </div>

    <!-- ========================================== -->
    <!-- MODAL: VIDEO PLAYER -->
    <!-- ========================================== -->
    <div
      id="player-modal"
      class="fixed inset-0 z-[100] modal-backdrop hidden items-center justify-center p-4"
    >
      <div
        class="relative w-full max-w-5xl aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/10"
      >
        <button
          onclick="closePlayer()"
          class="absolute top-4 right-4 z-10 bg-black/50 p-2 rounded-full hover:bg-red-600 transition-colors"
        >
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <iframe
          id="video-iframe"
          class="w-full h-full"
          src=""
          frameborder="0"
          allow="autoplay; fullscreen"
        ></iframe>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPTS -->
    <!-- ========================================== -->
    <script src="config.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/player.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
